name: Build and Deploy Quasar SPA

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Quasar SPA
        run: npx quasar build -m spa

      - name: Build Capacitor web bundle
        run: npx quasar build -m capacitor -T android --skip-pkg

      - name: Create update artifacts
        run: |
          jq -r .version package.json > dist/spa/version.txt
          cd src-capacitor/www
          zip -r www.zip .
          mv www.zip ../../dist/spa/www.zip

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/spa/index.html dist/spa/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/spa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
